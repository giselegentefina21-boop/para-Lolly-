<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Para Loly ❤️</title>

    <meta name="theme-color" content="#faf8f5">

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

    <!-- Fundo -->
    <div id="background"></div>

    <!-- Partículas -->
    <div id="particles"></div>

    <!-- Tela Inicial -->
    <section id="intro">

        <div class="intro-content">

            <p class="intro-text">
                Para a mulher que transformou a dor em amor...
            </p>

            <img
    src="https://i.imgur.com/OiUkgIy.png"
    class="flower"
    alt="Lírio da Loly">

            <h2 class="quote">
                Em meio ao luto,<br>
                Deus fez florescer o nosso amor.
            </h2>

        </div>

    </section>

    <!-- Carta -->
    <section id="letter">

        <div class="paper">

            <h1>Para você, Loly ❤️</h1>

            <div id="typing"></div>

            <div id="signature">

                <span>Com todo o meu amor...</span>

                <h2>Do seu amor,<br>Gisele ❤️</h2>

            </div>

            <button id="playAudio">

                🎙️ Ouvir minha mensagem

            </button>

        </div>

    </section>

    <!-- Rodapé -->
    <footer>

        Feito com amor para Loly ❤️

    </footer>

    <!-- Áudio -->
    <audio id="audio">

        <source src="assets/audio.mp3" type="audio/mpeg">

    </audio>

    <script src="script.js"></script>

</body>

</html>

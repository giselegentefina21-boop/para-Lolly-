<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Para Lolly ❤️</title>

    <meta name="theme-color" content="#faf8f5">

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

    <!-- Fundo -->
    <div id="background"></div>

    <!-- Partículas -->
    <div id="particles"></div>

    <!-- Introdução -->
    <section id="intro">

        <div class="intro-content">

            <p class="intro-text">
                Para a mulher que transformou a dor em amor...
            </p>

            <img src="flor.png" class="flower" alt="Flor da Loly">

            <button id="playAudio" class="play-button">
                ❤️ Toque para começar
            </button>

            <h2 class="quote">
                Em meio ao luto,<br>
                Deus fez florescer o nosso amor.
            </h2>

        </div>

    </section>

    <!-- Carta -->
    <section id="letter">

        <div class="paper">

            <h1>Para você, Lolly ❤️</h1>

            <div id="typing"></div>

            <div id="signature">

                <span>Com todo o meu amor...</span>

                <h2>
                    Do seu amor,<br>
                    Gisele ❤️
                </h2>

            </div>

        </div>

    </section>

    <!-- Rodapé -->
    <footer>

        Feito com amor para Lolly ❤️

    </footer>

    <!-- Áudio -->
    <audio id="audio" preload="auto">
        <source src="audio.mp3" type="audio/mpeg">
        Seu navegador não suporta áudio.
    </audio>

    <script src="script.js"></script>

    <script>

        const playButton = document.getElementById("playAudio");
        const audio = document.getElementById("audio");

        playButton.addEventListener("click", () => {

            audio.play();

            playButton.style.display = "none";

        });

    </script>

</body>

</html>
